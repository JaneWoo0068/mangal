version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -X 'github.com/metafates/mangal/constant.BuiltAt={{ .Date }}'
      - -X 'github.com/metafates/mangal/constant.BuiltBy={{ .Env.USER }}'
      - -X 'github.com/metafates/mangal/constant.Revision={{ .ShortCommit }}'
      - -s
      - -w

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}Darwin
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "windows" }}Windows
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - completions/*
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Dependency updates
      regexp: "^.*feat\\(deps\\)*:+.*$"
      order: 300
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: 'Documentation updates'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 400
    - title: Other work
      order: 9999
  filters:
    exclude:
      - '^test'
      - '^chore'
      - '^refactor'
      - '^build'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy

dockers:
  - goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/janewoo0068/koma:latest"
      - "ghcr.io/janewoo0068/koma:{{ .Tag }}"
    skip_push: false
    use: docker
  - goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/janewoo0068/koma:latest-arm64"
      - "ghcr.io/janewoo0068/koma:{{ .Tag }}-arm64"
    skip_push: false
    use: docker

brews:
  - name: koma

    repository:
      owner: JaneWoo0068
      name: homebrew-koma
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/JaneWoo0068/koma"
    description: "The ultimate CLI manga downloader!"
    license: "MIT"
    skip_upload: false

    test: |
      system "#{bin}/koma -v"

    install: |-
      bin.install "koma"
      bash_completion.install "completions/koma.bash" => "koma"
      zsh_completion.install "completions/koma.zsh" => "_koma"
      fish_completion.install "completions/koma.fish"

release:
  github:
    owner: JaneWoo0068
    name: koma

  name_template: "{{.ProjectName}} v{{.Version}}"
  header: |
    ## What's new?

  footer: |

    **Full Changelog**: https://github.com/JaneWoo0068/koma/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---

    Bugs? Suggestions? [Open an issue](https://github.com/JaneWoo0068/koma/issues/new/choose)

nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    homepage: https://github.com/JaneWoo0068/koma
    maintainer: JaneWoo0068
    description: |-
      The most advanced cli manga downloader in the entire universe!

    license: MIT
    formats:
      - deb
      - rpm

    bindir: /usr/local/bin
    section: utils

    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

    contents:
      - src: ./completions/koma.bash
        dst: /usr/share/bash-completion/completions/koma
        file_info:
          mode: 0644
      - src: ./completions/koma.fish
        dst: /usr/share/fish/completions/koma.fish
        file_info:
          mode: 0644
      - src: ./completions/koma.zsh
        dst: /usr/share/zsh/vendor-completions/_koma
        file_info:
          mode: 0644
      - src: ./LICENSE
        dst: /usr/share/doc/koma/copyright
        file_info:
          mode: 0644
